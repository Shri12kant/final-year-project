spring.application.name=communityhub-backend

# ✅ Railway MySQL (तुम्हारे exact vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server
server.port=${PORT:8080}

# ✅ CORS Fixed for Vercel + Local
spring.web.cors.allowed-origins=https://final-year-project-phi-ten.vercel.app,http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT
jwt.secret=${JWT_SECRET:communityhub-dev-jwt-secret-change-me-32bytes-minimum-123456}
jwt.expiration-ms=86400000

# Media upload - use /app/uploads for Railway persistent volume
app.media.upload-dir=${UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary Configuration
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api.key=${CLOUDINARY_API_KEY:}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:}

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:https://final-year-project-phi-ten.vercel.app}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:shrikantkushwaha390@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nsst xorn gzfu sfby}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# HikariCP timeout (Railway slow connections के लिए)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000