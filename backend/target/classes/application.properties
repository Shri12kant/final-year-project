spring.application.name=communityhub-backend

# MySQL configuration for Railway
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/communityhub}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server configuration
server.port=${PORT:8081}

# CORS configuration for Vercel frontend
spring.web.cors.allowed-origins=https://final-year-project-phi-ten.vercel.app,https://localhost:5173,https://localhost:5174
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT
jwt.secret=${JWT_SECRET:communityhub-dev-jwt-secret-change-me-32bytes-minimum-123456}
jwt.expiration-ms=86400000

# Media upload settings
app.media.upload-dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:shrikantkushwaha390@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nsst xorn gzfu sfby}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

